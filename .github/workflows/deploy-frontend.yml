name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4            # Mise à jour v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4          # Mise à jour v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Lint
      run: npm run lint || true
    
    - name: Build
      run: npm run build -- --configuration docker
    
    - name: Run tests
      run: npm test -- --watch=false --browsers=ChromeHeadless
    
    - name: Upload build artifact
      uses: actions/upload-artifact@v4     # Mise à jour v4 (CORRECTION PRINCIPALE)
      with:
        name: frontend-build
        path: dist/

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4            # Mise à jour v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3  # Mise à jour v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3         # Mise à jour v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5    # Mise à jour v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/leoni-frontend:latest
          ${{ secrets.DOCKER_USERNAME }}/leoni-frontend:${{ github.sha }}
    
    - name: Image digest
      run: echo "Image pushed successfully"

