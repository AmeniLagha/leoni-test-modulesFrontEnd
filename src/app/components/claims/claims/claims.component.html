<div class="container py-4">
  <!-- HEADER GRADIENT LEONI -->
  <div class="card border-0 shadow-lg mb-4" style="background: linear-gradient(135deg, #1e3c72 0%, #0f2b4a 100%);">
    <div class="card-body p-4">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div>
          <h2 class="text-white mb-2">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Nouvelle réclamation
          </h2>
          <p class="text-white-50 mb-0">Créer et assigner une nouvelle réclamation</p>
        </div>
        <button type="button" class="btn btn-outline-light" (click)="goBack()">
          <i class="bi bi-arrow-left me-2"></i>Retour
        </button>
      </div>
    </div>
  </div>

  <!-- FORM CARD -->
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <form [formGroup]="form" (ngSubmit)="submit()">

        <div class="row g-4">
          <!-- Titre -->
          <div class="col-12">
            <label class="form-label fw-semibold">
              <i class="bi bi-pencil-square me-1 text-primary"></i>
              Titre <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" formControlName="title"
                   [class.is-invalid]="form.get('title')?.invalid && form.get('title')?.touched"
                   placeholder="Titre de la réclamation">
            <div class="invalid-feedback" *ngIf="form.get('title')?.invalid && form.get('title')?.touched">
              Le titre est requis
            </div>
          </div>

          <!-- Assigné à avec dropdown -->
          <div class="col-12 position-relative">
            <label class="form-label fw-semibold">
              <i class="bi bi-person-badge me-1 text-primary"></i>
              Assigné à <span class="text-danger">*</span>
            </label>
            <input type="text"
                   class="form-control"
                   formControlName="assignedTo"
                   [class.is-invalid]="form.get('assignedTo')?.invalid && form.get('assignedTo')?.touched"
                   placeholder="exemple@email.com"
                   (input)="filterEmails($event)"
                   (focus)="showDropdown = true"
                   autocomplete="off">

            <!-- Dropdown des emails -->
            <ul class="dropdown-menu show" *ngIf="showDropdown && filteredEmails.length > 0"
                style="position: absolute; z-index: 1000; width: 100%; max-height: 200px; overflow-y: auto;">
              <li *ngFor="let email of filteredEmails">
                <a class="dropdown-item" (click)="selectEmail(email)" href="javascript:void(0)">
                  <i class="bi bi-envelope me-2"></i>{{ email }}
                </a>
              </li>
              <li *ngIf="filteredEmails.length === 0" class="dropdown-item text-muted">
                Aucun email trouvé
              </li>
            </ul>

            <div class="invalid-feedback" *ngIf="form.get('assignedTo')?.invalid && form.get('assignedTo')?.touched">
              L'email est requis
            </div>
          </div>

          <!-- Description -->
          <div class="col-12">
            <label class="form-label fw-semibold">
              <i class="bi bi-chat-text me-1 text-primary"></i>
              Description <span class="text-danger">*</span>
            </label>
            <textarea class="form-control" formControlName="description" rows="4"
                      [class.is-invalid]="form.get('description')?.invalid && form.get('description')?.touched"
                      placeholder="Décrivez le problème..."></textarea>
            <div class="invalid-feedback" *ngIf="form.get('description')?.invalid && form.get('description')?.touched">
              La description est requise
            </div>
          </div>

          <!-- Priorité -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">
              <i class="bi bi-flag me-1 text-primary"></i>
              Priorité <span class="text-danger">*</span>
            </label>
            <select class="form-select" formControlName="priority">
              <option value="LOW">🟢 Basse</option>
              <option value="MEDIUM">🟡 Moyenne</option>
              <option value="HIGH">🟠 Haute</option>
              <option value="CRITICAL">🔴 Critique</option>
            </select>
          </div>

          <!-- Catégorie -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">
              <i class="bi bi-tags me-1 text-primary"></i>
              Catégorie <span class="text-danger">*</span>
            </label>
            <select class="form-select" formControlName="category">
              <option value="TECHNICAL">⚙️ Technique</option>
              <option value="QUALITY">📊 Qualité</option>
              <option value="LOGISTIC">🚚 Logistique</option>
              <option value="OTHER">📝 Autre</option>
            </select>
          </div>

          <!-- Upload d'image -->
          <div class="col-12">
            <label class="form-label fw-semibold">
              <i class="bi bi-image me-1 text-primary"></i>
              Image (optionnelle)
            </label>

            <div class="file-upload-area">
              <input type="file" (change)="onFileSelected($event)" accept="image/*" class="file-input" #fileInput>
              <div class="upload-placeholder" (click)="fileInput.click()">
                <i class="bi bi-cloud-upload fs-1 text-muted"></i>
                <p class="mb-0 mt-2">Cliquez pour choisir une image</p>
                <small class="text-muted">JPG, PNG, GIF jusqu'à 5MB</small>
              </div>
            </div>

            <!-- Prévisualisation de l'image -->
            <div class="image-preview-wrapper" *ngIf="imagePreview">
              <div class="image-preview-card">
                <img [src]="imagePreview" alt="Aperçu" class="preview-image">
                <button type="button" class="btn-remove-image" (click)="removeImage()" title="Supprimer l'image">
                  <i class="bi bi-x-lg"></i>
                </button>
                <div class="image-info">
                  <span class="file-name">{{ selectedFile?.name }}</span>
                  <span class="file-size">{{ formatFileSize(selectedFile?.size) }}</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Champs cachés -->
          <input type="hidden" formControlName="chargeSheetId">
          <input type="hidden" formControlName="relatedTo">
          <input type="hidden" formControlName="relatedId">

          <!-- Boutons d'action -->
          <div class="col-12">
            <hr class="my-2">
            <div class="d-flex justify-content-end gap-3">
              <button type="button" class="btn btn-outline-danger px-4" (click)="goBack()">
                <i class="bi bi-x-circle me-2"></i>Annuler
              </button>
              <button type="submit" class="btn btn-primary px-4" [disabled]="form.invalid || isUploading">
                <span *ngIf="!isUploading">
                  <i class="bi bi-check-circle me-2"></i>Créer réclamation
                </span>
                <span *ngIf="isUploading">
                  <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                  Upload en cours...
                </span>
              </button>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
